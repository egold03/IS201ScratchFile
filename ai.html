<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Endless Slither Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    canvas {
        display: block;
        margin: auto;
        background: #222;
    }
    #info {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
    }
</style>
</head>
<body>

<div id="info"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const info = document.getElementById("info");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = { x: canvas.width/2, y: canvas.height/2 };
document.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

class Snake {
    constructor(x, y, color, name, isAI=false) {
        this.body = [{x, y}];
        this.angle = Math.random() * Math.PI * 2;
        this.targetAngle = this.angle;
        this.speed = 2;
        this.length = 60;
        this.color = color;
        this.name = name;
        this.isAI = isAI;
        this.turnSpeed = 0.05;
        this.id = Math.random();
    }

    update(targetX, targetY) {
        let head = this.body[0];

        this.targetAngle = Math.atan2(targetY - head.y, targetX - head.x);

        let diff = this.targetAngle - this.angle;
        diff = Math.atan2(Math.sin(diff), Math.cos(diff));

        this.angle += diff * this.turnSpeed;

        let speed = this.speed + Math.sin(Date.now()/200 + this.id) * 0.3;

        let newHead = {
            x: head.x + Math.cos(this.angle) * speed,
            y: head.y + Math.sin(this.angle) * speed
        };

        this.body.unshift(newHead);

        while (this.body.length > this.length) {
            this.body.pop();
        }
    }

    draw() {
        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.strokeStyle = this.color;

        ctx.beginPath();
        for (let i = 0; i < this.body.length; i++) {
            let p = this.body[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();

        let head = this.body[0];
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(this.name, head.x, head.y - 15);
    }
}

// SETTINGS
const AI_COUNT = 5;

let player;
let aiSnakes = [];
let playerScore = 0;
let aiScore = 0;
let isResetting = false;

function randomColor() {
    return `hsl(${Math.random()*360}, 100%, 50%)`;
}

function resetRound() {
    player = new Snake(canvas.width/2, canvas.height/2, "lime", "You");

    aiSnakes = [];
    for (let i = 0; i < AI_COUNT; i++) {
        aiSnakes.push(
            new Snake(
                Math.random()*canvas.width,
                Math.random()*canvas.height,
                randomColor(),
                "AI",
                true
            )
        );
    }
}

function checkCollision(head, snake) {
    for (let i = 8; i < snake.body.length; i++) {
        let p = snake.body[i];
        let dist = Math.hypot(head.x - p.x, head.y - p.y);
        if (dist < 10) return true;
    }
    return false;
}

function aiTarget(ai) {
    let playerHead = player.body[0];

    let offsetX = Math.sin(Date.now()/600 + ai.id) * 80;
    let offsetY = Math.cos(Date.now()/600 + ai.id) * 80;

    return {
        x: playerHead.x + offsetX,
        y: playerHead.y + offsetY
    };
}

function handlePoint(message) {
    isResetting = true;

    setTimeout(() => {
        alert(message);
        resetRound();
        isResetting = false;
    }, 100);
}

function update() {
    if (isResetting) return;

    player.update(mouse.x, mouse.y);

    aiSnakes.forEach(ai => {
        let target = aiTarget(ai);
        ai.update(target.x, target.y);
    });

    let playerHead = player.body[0];

    for (let ai of aiSnakes) {
        if (checkCollision(playerHead, ai)) {
            aiScore++;
            handlePoint("AI scores!");
            return;
        }
    }

    for (let ai of aiSnakes) {
        if (checkCollision(ai.body[0], player)) {
            playerScore++;
            handlePoint("You score!");
            return;
        }
    }

    for (let i = 0; i < aiSnakes.length; i++) {
        for (let j = 0; j < aiSnakes.length; j++) {
            if (i === j) continue;
            if (checkCollision(aiSnakes[i].body[0], aiSnakes[j])) {
                aiScore++;
                handlePoint("AI chaos!");
                return;
            }
        }
    }
}

function draw() {
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    player.draw();
    aiSnakes.forEach(ai => ai.draw());

    info.innerText = `Player: ${playerScore} | AI: ${aiScore}`;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

resetRound();
loop();
</script>

</body>
</html>
